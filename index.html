<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://pushcamp.rambodata.com/pn/sdk.js?siteId=a98986bbc1b4b065" async></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        
        .card-shadow {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
        
        .btn-glow:hover {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.5), 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }
        
        .btn-pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: .9;
            }
        }
        
        .fade-in {
            animation: fadeIn 0.6s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 md:p-6">
    <main class="w-full max-w-md fade-in">
        <div class="bg-white rounded-2xl card-shadow p-8 md:p-10 text-center">
            <!-- Shield Icon -->
            <div class="flex justify-center mb-6">
                <div class="w-16 h-16 md:w-20 md:h-20 bg-blue-50 rounded-full flex items-center justify-center">
                    <svg class="w-8 h-8 md:w-10 md:h-10 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 0 01-8.618 3.04A12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path>
                    </svg>
                </div>
            </div>
            
            <!-- Heading -->
            <h1 class="text-2xl md:text-3xl font-bold text-gray-900 mb-3">
                Security Check
            </h1>
            
            <!-- Message -->
            <p class="text-gray-600 text-base md:text-lg mb-8">
                Please verify you are human to continue
            </p>
            
            <!-- Button -->
            <button 
                id="verifyBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold text-base md:text-lg py-4 md:py-5 px-6 rounded-xl transition-all duration-200 btn-glow btn-pulse transform hover:scale-[1.02] active:scale-[0.98] cursor-pointer focus:outline-none focus:ring-4 focus:ring-blue-300"
                aria-label="Verify you are human and continue to Google"
            >
                I'm Human - Continue
            </button>
            
            <!-- Subtext -->
            <p class="text-xs md:text-sm text-gray-400 mt-6">
                This helps us prevent automated traffic
            </p>
        </div>
        
        <!-- Footer -->
        <div class="text-center mt-6">
            <p class="text-sm text-gray-500">
                Protected by Security Shield
            </p>
        </div>
    </main>

    <script>
        document.getElementById('verifyBtn').addEventListener('click', function() {
            // Add slight delay for visual feedback
            this.innerHTML = 'Verifying...';
            this.disabled = true;
            this.classList.remove('btn-pulse');
            
            setTimeout(function() {
                window.location.href = 'https://placedtasks.blogspot.com';
            }, 400);
        });
        
        // Prevent right-click for basic bot deterrent
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });
        
        // Add keyboard support
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                const btn = document.getElementById('verifyBtn');
                if (document.activeElement !== btn) {
                    btn.focus();
                }
            }
        });
    </script>
<script>(function(){document.addEventListener("click",function(e){var a=e.target.closest("[data-product-id]");if(!a)return;e.preventDefault();var pid=a.getAttribute("data-product-id");if(pid)parent.postMessage({type:"ecto-artifact-link-click",productId:pid},"*")})})();</script>
</body>
</html>
